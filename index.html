<!DOCTYPE html>
<html lang="en">
	<head>
		<title>V</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="main.css">
	</head>
	<body>

		<video id="video" loop crossOrigin="anonymous" playsinline style="display:none">
			<source src="assets/SCAM-426.mp4">
		</video>

		<script id="vs" type="x-shader/x-vertex">

			uniform sampler2D map;

			uniform float width;
			uniform float height;
			uniform float nearClipping, farClipping;

			uniform float pointSize;
			uniform float zOffset;
			uniform bool sphereMode;
			uniform float sphereRadius;

			varying vec2 vUv;

			const float XtoZ = 1.11146;
			const float YtoZ = 0.83359;
			const float PI = 3.14159265359;

			void main() {

				vUv = vec2( position.x / width, position.y / height );

				vec4 color = texture2D( map, vUv );
				float depth = ( color.r + color.g + color.b ) / 3.0;

				vec4 pos;

				if (sphereMode) {
					// Spherical projection
					float radius = mix(nearClipping, farClipping, depth);
					float theta = (position.x / width) * PI * 2.0;
					float phi = (position.y / height) * PI;
					
					float r = sphereRadius + radius * 0.01;
					
					pos = vec4(
						r * sin(phi) * cos(theta),
						r * cos(phi),
						r * sin(phi) * sin(theta),
						1.0
					);
				} else {
					// Original planar projection
					float z = ( 1.0 - depth ) * (farClipping - nearClipping) + nearClipping;

					pos = vec4(
						( position.x / width - 0.5 ) * z * XtoZ,
						( position.y / height - 0.5 ) * z * YtoZ,
						- z + zOffset,
						1.0);
				}

				gl_PointSize = pointSize;
				gl_Position = projectionMatrix * modelViewMatrix * pos;

			}

		</script>

		<script id="fs" type="x-shader/x-fragment">

			uniform sampler2D map;

			varying vec2 vUv;

			void main() {

				vec4 color = texture2D( map, vUv );
				gl_FragColor = vec4( color.r, color.g, color.b, 0.2 );

			}

		</script>

		<script type="module" src="/main.js"></script>
	</body>
</html>
